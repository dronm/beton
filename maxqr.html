<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Регистрация в MAX-боте</title>
	<style>
		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #f5f7fb;
			font-family: Arial, sans-serif;
			color: #1f2937;
		}

		.wrapper {
			width: 100%;
			max-width: 420px;
			padding: 24px;
		}

		.card {
			background: #ffffff;
			border-radius: 20px;
			padding: 32px 24px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
			text-align: center;
		}

		.header {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 10px;
			margin-bottom: 20px;
		}

		.header img {
			width: 32px;
			height: 32px;
			display: block;
		}

		.header-title {
			font-size: 22px;
			font-weight: 700;
			line-height: 1.2;
		}

		.text {
			font-size: 18px;
			line-height: 1.5;
			margin: 0 0 24px;
		}

		.qr-box {
			display: flex;
			justify-content: center;
		}

		.qr-box img {
			width: 240px;
			max-width: 100%;
			height: auto;
			display: block;
		}
	</style>
</head>
<body>
	<div class="wrapper">
		<div class="card">
			<div class="header">
				<img src="img/MAX-32x32.png" alt="MAX" />
				<div class="header-title">MAX</div>
			</div>

			<p class="text">
				Для регистрации в MAX-боте отсканируйте QR-код
			</p>

			<div class="qr-box">
				<img src="img/max-qr-code.svg" alt="QR-код для регистрации в MAX-боте" />
			</div>
		</div>
	</div>
</body>
</html>
